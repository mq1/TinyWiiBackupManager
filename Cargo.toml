[package]
name = "TinyWiiBackupManager"
version = "6.0.0"
rust-version = "1.94"
edition = "2024"
authors = ["Manuel Quarneti <mq1@ik.me>"]
license = "GPL-3.0-only"
repository = "https://github.com/mq1/TinyWiiBackupManager"
homepage = "https://github.com/mq1/TinyWiiBackupManager/wiki"
description = "A tiny game backup and homebrew app manager for the Wii"

[package.metadata.winresource]
OriginalFilename = "TinyWiiBackupManager.exe"
LegalCopyright = "Copyright © 2026 Manuel Quarneti. Licensed under GPL-3.0-only."

[dependencies]
slint = { git = "https://github.com/slint-ui/slint.git", rev = "f4493b6", default-features = false, features = [
  "accessibility",
  "backend-winit",
  "compat-1-2",
  "renderer-femtovg",
  "renderer-software",
  "std",
  "serde",
  "raw-window-handle-06",
] }
raw-window-handle = "0.6"
anyhow = "1.0"
open = "5.3"
directories = "6.0"
serde = "1.0"
serde_json = "1.0"
rfd = "0.17"
fuzzy-matcher = "0.3"
derive-getters = { version = "0.5", features = ["auto_copy_getters"] }
postcard = { version = "1.1", features = ["use-std"] }
zstd = { version = "0.13", optional = true }
fs_extra = "1.3"
fs4 = { version = "0.13", default-features = false }

[target.'cfg(target_vendor = "pc")'.dependencies]
minreq = { version = "2.14", features = ["https-native"] }
windows = { version = "0.62", features = ["Win32_Graphics_Dwm"] }
dark-light = "2.0"

[target.'cfg(target_vendor = "win7")'.dependencies]
minreq = { version = "2.14", features = ["https-rustls"] }
windows = { version = "0.62", features = [
  "Win32_UI_Controls_Dialogs",
  "Win32_UI_Shell_Common",
  "Win32_System_Com",
] }

[target.'cfg(target_os = "linux")'.dependencies]
minreq = { version = "2.14", features = ["https-rustls-probe"] }

[target.'cfg(target_os = "macos")'.dependencies]
minreq = { version = "2.14", features = ["https-native"] }


[build-dependencies]
slint-build = { git = "https://github.com/slint-ui/slint.git", rev = "f4493b6" }
lucide-slint = "1.7"
winresource = "0.1"
regex = "1.12"
zstd = { version = "0.13", optional = true }
postcard = { version = "1.1", features = ["use-std"] }
serde = { version = "1.0", features = ["derive"] }


[features]
default = ["compress-idmap"]
compress-idmap = ["dep:zstd"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"

[lints.rust]
rust_2018_idioms = "deny"

[lints.clippy]
all = "warn"
pedantic = "warn"
missing-errors-doc = { level = "allow", priority = 1 }
missing-panics-doc = { level = "allow", priority = 1 }
