[env]
PKG_CONFIG_ALLOW_CROSS = 1

CC_x86_64_unknown_linux_gnu = "clang-21"
AR_x86_64_unknown_linux_gnu = "llvm-ar-21"
CFLAGS_x86_64_unknown_linux_gnu = "-O3 -flto"

CC_i686_unknown_linux_gnu = "clang-21"
AR_i686_unknown_linux_gnu = "llvm-ar-21"
CFLAGS_i686_unknown_linux_gnu = "-O3 -flto"
PKG_CONFIG_PATH_i686_unknown_linux_gnu = "/usr/lib/i386-linux-gnu/pkgconfig"

CC_aarch64_unknown_linux_gnu = "clang-21"
AR_aarch64_unknown_linux_gnu = "llvm-ar-21"
CFLAGS_aarch64_unknown_linux_gnu = "-O3 -flto"

CC_armv7_unknown_linux_gnueabihf = "clang-21"
AR_armv7_unknown_linux_gnueabihf = "llvm-ar-21"
CFLAGS_armv7_unknown_linux_gnueabihf = "-O3 -flto"
PKG_CONFIG_PATH_armv7_unknown_linux_gnueabihf = "/usr/lib/arm-linux-gnueabihf/pkgconfig"

CC_x86_64_pc_windows_msvc = "clang-cl"
CFLAGS_x86_64_pc_windows_msvc = "/clang:-O3 /clang:-flto /clang:-fuse-ld=lld-link"
AR_x86_64_pc_windows_msvc = "llvm-lib"

CC_i686_pc_windows_msvc = "clang-cl"
CFLAGS_i686_pc_windows_msvc = "/clang:-O3 /clang:-flto /clang:-fuse-ld=lld-link"
AR_i686_pc_windows_msvc = "llvm-lib"

CC_aarch64_pc_windows_msvc = "clang-cl"
CFLAGS_aarch64_pc_windows_msvc = "/clang:-O3 /clang:-flto /clang:-fuse-ld=lld-link"
AR_aarch64_pc_windows_msvc = "llvm-lib"

CC_x86_64_win7_windows_msvc = "clang-cl"
CFLAGS_x86_64_win7_windows_msvc = "/clang:-O3"

CC_i686_win7_windows_msvc = "clang-cl"
CFLAGS_i686_win7_windows_msvc = "/clang:-O3"

CC_aarch64_apple_darwin = "/opt/homebrew/opt/llvm@21/bin/clang"
CFLAGS_aarch64_apple_darwin = "-O3"

CC_x86_64_apple_darwin = "/opt/homebrew/opt/llvm@21/bin/clang"
CFLAGS_x86_64_apple_darwin = "-O3"


[target.x86_64-unknown-linux-gnu]
linker = "clang-21"
rustflags = [
  "-C",
  "linker-plugin-lto",
  "-C",
  "link-arg=-fuse-ld=lld-21",
  "-C",
  "link-arg=--target=aarch64-unknown-linux-gnu",
]

[target.i686-unknown-linux-gnu]
linker = "clang-21"
rustflags = [
  "-C",
  "linker-plugin-lto",
  "-C",
  "link-arg=-fuse-ld=lld-21",
  "-C",
  "link-arg=--target=i686-unknown-linux-gnu",
]

[target.aarch64-unknown-linux-gnu]
linker = "clang-21"
rustflags = [
  "-C",
  "linker-plugin-lto",
  "-C",
  "link-arg=-fuse-ld=lld-21",
  "-C",
  "link-arg=--target=aarch64-unknown-linux-gnu",
]

[target.armv7-unknown-linux-gnueabihf]
linker = "clang-21"
rustflags = [
  "-C",
  "linker-plugin-lto",
  "-C",
  "link-arg=-fuse-ld=lld-21",
  "-C",
  "link-arg=--target=armv7-unknown-linux-gnueabihf",
]

[target.x86_64-pc-windows-msvc]
linker = "lld-link"
rustflags = [
  "-C",
  "link-arg=/STACK:8000000",
  "-C",
  "linker-plugin-lto",
  "-C",
  "target-feature=+crt-static",
  "-L",
  "native=VC-LTL-Binary\\TargetPlatform\\10.0.19041.0\\lib\\x64",
]

[target.i686-pc-windows-msvc]
linker = "lld-link"
rustflags = [
  "-C",
  "link-arg=/STACK:8000000",
  "-C",
  "linker-plugin-lto",
  "-C",
  "target-feature=+crt-static",
  "-L",
  "native=VC-LTL-Binary\\TargetPlatform\\10.0.19041.0\\lib\\Win32",
]

[target.aarch64-pc-windows-msvc]
linker = "lld-link"
rustflags = [
  "-C",
  "link-arg=/STACK:8000000",
  "-C",
  "linker-plugin-lto",
  "-C",
  "target-feature=+crt-static",
  "-L",
  "native=VC-LTL-Binary\\TargetPlatform\\10.0.19041.0\\lib\\ARM64",
]

[target.x86_64-win7-windows-msvc]
rustflags = [
  "-C",
  "link-arg=/STACK:8000000",
  "-l",
  "dylib=ole32",
  "-C",
  "target-feature=+crt-static",
  "-L",
  "native=VC-LTL-Binary\\TargetPlatform\\5.2.3790.0\\lib\\x64",
  "-C",
  "link-arg=YY-Thunks-Objs\\objs\\x64\\YY_Thunks_for_WinXP.obj",
  "-C",
  "link-arg=/SUBSYSTEM:WINDOWS,5.2",
]

[target.i686-win7-windows-msvc]
rustflags = [
  "-C",
  "link-arg=/STACK:8000000",
  "-l",
  "dylib=ole32",
  "-C",
  "target-feature=+crt-static",
  "-L",
  "native=VC-LTL-Binary\\TargetPlatform\\5.1.2600.0\\lib\\Win32",
  "-C",
  "link-arg=YY-Thunks-Objs\\objs\\x86\\YY_Thunks_for_WinXP.obj",
  "-C",
  "link-arg=/SUBSYSTEM:WINDOWS,5.1",
]
