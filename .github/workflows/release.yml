name: Release

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*.*.*"
    paths:
      - "build.rs"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package/**"
      - ".github/workflows/release.yml"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  VERSION_NAME: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

jobs:
  # ==================================================================================
  #  Build & Bundle Jobs: Run the platform-specific build scripts.
  # ==================================================================================
  build-linux:
    name: Build for Linux
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            arch: x86_64-v3
            appimage-arch: x86_64
            rustflags: -C target-cpu=x86-64-v3
            cflags: -mcpu=x86_64_v3
            cxxflags: -mcpu=x86_64_v3
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            arch: x86_64-v2
            appimage-arch: x86_64
            rustflags: -C target-cpu=x86-64-v2
            cflags: -mcpu=x86_64_v2
            cxxflags: -mcpu=x86_64_v2
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            arch: x86_64
            appimage-arch: x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            arch: arm64
            appimage-arch: aarch64
          - target: i686-unknown-linux-gnu
            runner: ubuntu-24.04
            arch: x86
            appimage-arch: i686
          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-24.04-arm
            arch: armhf
            appimage-arch: armhf

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y appstream

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.93
        with:
          components: rust-src

      - name: Install cargo-zigbuild
        run: pip3 install cargo-zigbuild

      - name: Download appimagetool
        run: |
          wget "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.appimage-arch }}.AppImage"
          chmod +x appimagetool-${{ matrix.appimage-arch }}.AppImage

      - name: Build binary
        run: |
          cargo zigbuild -Z build-std=std,panic_abort --release --locked --target ${{ matrix.target }}.2.17
        env:
          RUSTC_BOOTSTRAP: 1
          RUSTFLAGS: ${{ matrix.rustflags }}
          CFLAGS: ${{ matrix.cflags }} -O3 -flto
          CXXFLAGS: ${{ matrix.cxxflags }} -O3 -flto

      - name: Setup directories
        run: |
          cp "target/${{ matrix.target }}/release/TinyWiiBackupManager" TinyWiiBackupManager
          cp -r package/linux TinyWiiBackupManager.AppDir
          install -Dm0755 TinyWiiBackupManager TinyWiiBackupManager.AppDir/usr/bin/TinyWiiBackupManager
          mkdir -p dist

      - name: Package binary as tar.gz
        run: |
          tar -I 'gzip -9' --owner=0 --group=0 --mode=0755 -cvf "dist/TinyWiiBackupManager-${{ env.VERSION_NAME }}-linux-${{ matrix.arch }}.tar.gz" TinyWiiBackupManager

      - name: Package binary as AppImage
        run: |
          export VERSION="${VERSION_NAME#v}"
          ./appimagetool-${{ matrix.appimage-arch }}.AppImage \
            -u "gh-releases-zsync|mq1|TinyWiiBackupManager|latest|*${{ matrix.arch }}.AppImage.zsync" \
            TinyWiiBackupManager.AppDir \
            dist/TinyWiiBackupManager-${{ env.VERSION_NAME }}-linux-${{ matrix.arch }}.AppImage
          cp *.zsync dist/
        env:
          ARCH: ${{ matrix.appimage-arch }}

      - name: Upload Linux distributables
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux-${{ matrix.arch }}
          path: dist/*

  build-windows:
    name: Build for Windows
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            platform: windows
            arch: x86_64-v3
            rustflags: -C target-cpu=x86-64-v3
            cflags: /clang:-march=x86-64-v3
            cxxflags: /clang:-march=x86-64-v3
          - target: x86_64-pc-windows-msvc
            platform: windows
            arch: x86_64-v2
            rustflags: -C target-cpu=x86-64-v2
            cflags: /clang:-march=x86-64-v2
            cxxflags: /clang:-march=x86-64-v2
          - target: x86_64-pc-windows-msvc
            platform: windows
            arch: x86_64
          - target: aarch64-pc-windows-msvc
            platform: windows
            arch: arm64
          - target: i686-pc-windows-msvc
            platform: windows
            arch: x86
          - target: x86_64-win7-windows-msvc
            platform: windows-legacy
            arch: x86_64
          - target: i686-win7-windows-msvc
            platform: windows-legacy
            arch: x86

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.93
        with:
          components: rust-src

      - name: Download VC-LTL5
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/Chuyu-Team/VC-LTL5/releases/latest/download/VC-LTL-Binary.7z" -OutFile "VC-LTL-Binary.7z"
          7z x VC-LTL-Binary.7z -oVC-LTL-Binary

      - name: Download YY-Thunks
        if: matrix.platform == 'windows-legacy'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/Chuyu-Team/YY-Thunks/releases/latest/download/YY-Thunks-Objs.zip" -OutFile "YY-Thunks-Objs.zip"
          7z x YY-Thunks-Objs.zip -oYY-Thunks-Objs

      - name: Build binary
        shell: pwsh
        run: cargo build -Z build-std=std,panic_abort --release --locked --target ${{ matrix.target }}
        env:
          RUSTC_BOOTSTRAP: 1
          CC: ${{ env.LLVM_PATH }}\bin\clang-cl.exe
          CXX: ${{ env.LLVM_PATH }}\bin\clang-cl.exe
          RUSTFLAGS: ${{ matrix.rustflags }} -C target-feature=+crt-static
          CFLAGS: ${{ matrix.cflags }} /clang:-O3
          CXXFLAGS: ${{ matrix.cxxflags }} /clang:-O3

      - name: Package binary as zip
        shell: pwsh
        run: |
          New-Item -Path "dist" -ItemType Directory
          Copy-Item -Path "target/${{ matrix.target }}/release/TinyWiiBackupManager.exe" -Destination TinyWiiBackupManager.exe
          7z a -tzip -mx=9 "dist/TinyWiiBackupManager-${{ env.VERSION_NAME }}-${{ matrix.platform }}-${{ matrix.arch }}.zip" TinyWiiBackupManager.exe

      - name: Upload Windows distributables
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*

  build-macos:
    name: Build for macOS
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.93
        with:
          components: rust-src

      - name: Install cargo-zigbuild
        run: pip3 install cargo-zigbuild

      - name: Build binary
        run: cargo zigbuild -Z build-std=std,panic_abort --release --locked --target ${{ matrix.target }}
        env:
          RUSTC_BOOTSTRAP: 1
          CFLAGS: -O3 -flto
          CXXFLAGS: -O3 -flto

      - name: Upload macOS distributables
        uses: actions/upload-artifact@v4
        with:
          name: build-macos-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/TinyWiiBackupManager

  package-macos:
    name: Package Universal2 macOS app and DMGs
    runs-on: macos-26
    needs: [build-macos]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download macOS .app distributables
        uses: actions/download-artifact@v7
        with:
          pattern: "build-macos-*"

      - name: Make universal binary
        run: |
          mkdir build-macos-universal
          lipo -create build-macos-arm64/TinyWiiBackupManager build-macos-x86_64/TinyWiiBackupManager -output build-macos-universal/TinyWiiBackupManager

      - name: Create .app bundles
        run: |
          plain_ver="${VERSION_NAME#v}" # Remove leading 'v'
          sed -i "" "s/{{ VERSION_NAME }}/$plain_ver/" package/macos/Info.plist

          install -Dm0644 package/macos/Info.plist build-macos-universal/TinyWiiBackupManager.app/Contents/Info.plist
          install -Dm0644 package/macos/Info.plist build-macos-arm64/TinyWiiBackupManager.app/Contents/Info.plist
          install -Dm0644 package/macos/Info.plist build-macos-x86_64/TinyWiiBackupManager.app/Contents/Info.plist

          install -Dm0644 package/macos/TinyWiiBackupManager.icns build-macos-universal/TinyWiiBackupManager.app/Contents/Resources/TinyWiiBackupManager.icns
          install -Dm0644 package/macos/TinyWiiBackupManager.icns build-macos-arm64/TinyWiiBackupManager.app/Contents/Resources/TinyWiiBackupManager.icns
          install -Dm0644 package/macos/TinyWiiBackupManager.icns build-macos-x86_64/TinyWiiBackupManager.app/Contents/Resources/TinyWiiBackupManager.icns

          install -Dm0755 build-macos-universal/TinyWiiBackupManager build-macos-universal/TinyWiiBackupManager.app/Contents/MacOS/TinyWiiBackupManager
          install -Dm0755 build-macos-arm64/TinyWiiBackupManager build-macos-arm64/TinyWiiBackupManager.app/Contents/MacOS/TinyWiiBackupManager
          install -Dm0755 build-macos-x86_64/TinyWiiBackupManager build-macos-x86_64/TinyWiiBackupManager.app/Contents/MacOS/TinyWiiBackupManager

      - name: Sign apps
        run: |
          codesign --force --deep -s - build-macos-universal/TinyWiiBackupManager.app
          codesign --force --deep -s - build-macos-arm64/TinyWiiBackupManager.app
          codesign --force --deep -s - build-macos-x86_64/TinyWiiBackupManager.app

      - name: Install appdmg
        run: npm i -g appdmg

      - name: Create DMGs (assets from sindresorhus/create-dmg)
        run: |
          mkdir dist
          appdmg package/macos/appdmg-universal.json "dist/TinyWiiBackupManager-${{ env.VERSION_NAME }}-macos-universal.dmg"
          appdmg package/macos/appdmg-x86_64.json "dist/TinyWiiBackupManager-${{ env.VERSION_NAME }}-macos-x86_64.dmg"
          appdmg package/macos/appdmg-arm64.json "dist/TinyWiiBackupManager-${{ env.VERSION_NAME }}-macos-arm64.dmg"

      - name: Upload macOS distributables
        uses: actions/upload-artifact@v4
        with:
          name: dist-macos-all
          path: dist/*

  # ==================================================================================
  #  Release Job: Collects all artifacts and creates a single GitHub Release.
  # ==================================================================================
  release:
    name: Create GitHub Release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-slim
    needs: [build-linux, build-windows, package-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download distributables
        uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: "dist-*" # This pattern will match all final distributable artifacts
          merge-multiple: true # This places all matching artifacts into a single 'dist' directory

      - name: Create version.txt
        run: |
          plain_ver="${VERSION_NAME#v}" # Remove leading 'v'
          echo -n "$plain_ver" > version.txt  # Write without line break

      - name: Generate release notes
        run: ./scripts/generate-release-notes.sh $VERSION_NAME > BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            version.txt
          body_path: BODY.md
          prerelease: ${{ contains(env.VERSION_NAME, 'alpha') || contains(env.VERSION_NAME, 'beta') || contains(env.VERSION_NAME, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
